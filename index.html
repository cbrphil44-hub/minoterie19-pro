<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111827">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
<title>Application Recette 19</title>
</head>
<body>
<header>
  <div class="brand">
    <img id="mainLogo" class="appLogo" src="icon-192.png" alt="Recette 19" title="Application Recette 19">
    <div>
      <h1>Application Recette 19</h1>
      <div class="sub">V12</div>
    </div>
  </div>
</header>

<section id="accessGate" class="accessGate">
  <div class="accessCard">
    <img class="appLogo accessLogo" src="icon-192.png" alt="Application Recette 19">
    <h2>Accès réservé</h2>
    <p>Renseignez le nom de votre boulangerie pour demander l'autorisation.</p>
    <label>Nom de la boulangerie</label>
    <input id="bakeryNameInput" placeholder="Ex : Boulangerie Dupont">
    <button id="btnRequestAccess" type="button">Demander l'accès</button>
    <button id="btnCheckAccess" type="button" class="secondary">Vérifier l'autorisation</button>
    <p id="accessStatus" class="small">Chargement...</p>
  </div>
</section>

<main id="mainApp" style="display:none">
  <section id="installBox" class="installBox">
    <b>📱 Installez l'application</b>
    <p>Ajoutez cette application à l'écran d'accueil pour l'utiliser comme une vraie application.</p>
    <button id="btnInstallHelp" type="button">Comment installer ?</button>
    <button id="btnHideInstall" class="secondary" type="button">Plus tard</button>
  </section>

  <div class="toolbar">
    <button id="btnNewFamily" type="button">Nouvelle famille</button>
    <button id="btnNewRecipe" type="button">Nouvelle recette</button>
    <button id="btnPublish" class="copy" type="button">Créer mise à jour</button>
    <button id="btnClientSend" class="secondary" type="button">Envoyer ma recette</button>
    <button id="btnAdmin" class="secondary" type="button">Admin accès</button>
    <button id="btnSettings" class="secondary" type="button">Paramètres</button>
    <button id="btnSave" class="ok" type="button">Sauvegarder</button>
    <span id="status" class="saved">Sauvegarde automatique active</span>
  </div>

  <div class="layout">
    <aside class="familiesPanel">
      <div class="panelTitle">📂 Familles</div>
      <div id="familiesList"></div>
      <button id="btnNewFamily2" class="secondary fullBtn" type="button">+ Nouvelle famille</button>
    </aside>
    <section class="content">
      <div class="card">
        <div class="row">
          <div class="grow">
            <label>Recherche</label>
            <input id="search" placeholder="Rechercher une recette...">
          </div>
        </div>
        <div id="summary" class="pills"></div>
      </div>
      <section id="list"></section>
    </section>
  </div>
</main>

<div id="modal" class="modal">
  <div id="modalContent" class="modalContent"></div>
</div>

<form name="recette-client" method="POST" data-netlify="true" netlify hidden>
  <input type="hidden" name="form-name" value="recette-client">
  <input type="text" name="nom_recette">
  <input type="text" name="famille">
  <textarea name="donnees_json"></textarea>
  <textarea name="resume"></textarea>
</form>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="data.js"></script>
<script src="firebase.js"></script>
<script src="app.js"></script>
<script src="admin-1702.js"></script>
<script src="admin-dashboard-v123.js"></script>
</body>
</html>

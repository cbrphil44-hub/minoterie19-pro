<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111827">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Recette 19">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
<title>Application Recette 19</title>
</head>
<body>
<header>
  <div class="brand">
    <img src="icon-192.png" alt="Recette 19">
    <div><h1>Application Recette 19</h1><div class="sub">V4 — interface cartes stable</div></div>
  </div>
</header>
<main>
  <div class="toolbar">
    <button onclick="App.setFamily('Toutes')">Accueil</button>
    <button onclick="App.newFamily()">Nouvelle famille</button>
    <button onclick="App.newRecipe()">Nouvelle recette</button>
    <button class="copy" onclick="App.share()">Partager</button>
    <button class="secondary" onclick="App.settings()">Paramètres</button>
    <button class="ok" onclick="App.save()">Sauvegarder</button>
    <span id="status" class="saved">Données chargées</span>
  </div>

  <section class="card">
    <div class="row">
      <div class="grow"><label>Recherche</label><input id="search" placeholder="Rechercher une recette..." oninput="App.render()"></div>
    </div>
    <div id="tabs" class="tabs"></div>
    <div id="summary" class="pills"></div>
  </section>

  <section id="list"></section>
</main>
<div id="modal" class="modal"><div id="modalContent" class="modalContent"></div></div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
